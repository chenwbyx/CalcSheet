name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: macos-15

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_16.0.app

    - name: Build and Test
      run: |
        xcodebuild -project CalcSheet.xcodeproj \
                   -scheme CalcSheet \
                   -destination 'platform=macOS' \
                   clean test | xcpretty && exit ${PIPESTATUS[0]}

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: ~/Library/Developer/Xcode/DerivedData/*/Logs/Test/*.xcresult
