name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build and Release
    runs-on: macos-15

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.3'

    - name: Build arm64 (Apple Silicon)
      run: |
        xcodebuild -project CalcSheet.xcodeproj \
                   -scheme CalcSheet \
                   -configuration Release \
                   -arch arm64 \
                   ONLY_ACTIVE_ARCH=NO \
                   CONFIGURATION_BUILD_DIR=${{ github.workspace }}/build/Release-arm64 \
                   CODE_SIGN_IDENTITY="-" \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGNING_ALLOWED=NO \
                   clean build

    - name: Build x86_64 (Intel)
      run: |
        xcodebuild -project CalcSheet.xcodeproj \
                   -scheme CalcSheet \
                   -configuration Release \
                   -arch x86_64 \
                   ONLY_ACTIVE_ARCH=NO \
                   CONFIGURATION_BUILD_DIR=${{ github.workspace }}/build/Release-x86_64 \
                   CODE_SIGN_IDENTITY="-" \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGNING_ALLOWED=NO \
                   clean build

    - name: Create arm64 DMG
      run: |
        mkdir -p dmg_temp
        cp -R build/Release-arm64/CalcSheet.app dmg_temp/
        ln -s /Applications dmg_temp/Applications
        hdiutil create -volname "CalcSheet" \
                       -srcfolder dmg_temp \
                       -ov -format UDZO \
                       CalcSheet-arm64.dmg
        rm -rf dmg_temp

    - name: Create x86_64 DMG
      run: |
        mkdir -p dmg_temp
        cp -R build/Release-x86_64/CalcSheet.app dmg_temp/
        ln -s /Applications dmg_temp/Applications
        hdiutil create -volname "CalcSheet" \
                       -srcfolder dmg_temp \
                       -ov -format UDZO \
                       CalcSheet-x86_64.dmg
        rm -rf dmg_temp

    - name: Ad-hoc Sign DMGs
      run: |
        codesign --sign - CalcSheet-arm64.dmg
        codesign --sign - CalcSheet-x86_64.dmg

    - name: Get Version from Tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: CalcSheet v${{ steps.get_version.outputs.VERSION }}
        draft: false
        prerelease: false

    - name: Upload arm64 DMG
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./CalcSheet-arm64.dmg
        asset_name: CalcSheet-${{ steps.get_version.outputs.VERSION }}-arm64.dmg
        asset_content_type: application/x-apple-diskimage

    - name: Upload x86_64 DMG
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./CalcSheet-x86_64.dmg
        asset_name: CalcSheet-${{ steps.get_version.outputs.VERSION }}-x86_64.dmg
        asset_content_type: application/x-apple-diskimage
